<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 정보 - 대출 현황</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2><span th:text="${session.loginUser}"></span>님의 대출 현황</h2>

<table class="table table-striped mt-3">
    <thead class="table-dark">
    <tr>
        <th>대여번호</th>
        <th>도서번호</th>
        <th>대출일</th>
        <th>반납일</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="rental : ${rentals}">
        <td th:text="${rental.rental_no}">R001</td>
        <td th:text="${rental.book_no}">B001</td>
        <td th:text="${rental.rental_date}">2026-03-01</td>
        <td th:text="${rental.return_date != null ? rental.return_date : '미반납'}">미반납</td>
        <td>
            <form th:if="${rental.return_date == null}" th:action="@{/rental/{no}/return(no=${rental.rental_no})}" method="post" style="display:inline">
                <button type="submit" class="btn btn-sm btn-warning">반납</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(rentals)}">
        <td colspan="5" class="text-center">대출 내역이 없습니다.</td>
    </tr>
    </tbody>
</table>

<div class="mt-4">
    <a th:href="@{/}" class="btn btn-primary">도서 목록으로</a>
    <a th:href="@{/logout}" class="btn btn-outline-danger">로그아웃</a>
</div>

</body>
</html>
