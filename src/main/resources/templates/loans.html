<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 정보 - 예약 현황</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2><span th:text="${session.loginUser}"></span>님의 예약 현황</h2>

<table class="table table-striped mt-3">
    <thead class="table-dark">
    <tr>
        <th>번호</th>
        <th>도서 제목</th>
        <th>저자</th>
        <th>예약 일시</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="loan : ${loans}">
        <td th:text="${loan.id}">1</td>
        <td th:text="${loan.book.title}">도서 제목</td>
        <td th:text="${loan.book.author}">저자명</td>
        <td th:text="${#temporals.format(loan.loanDate, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
    </tr>
    <tr th:if="${#lists.isEmpty(loans)}">
        <td colspan="4" class="text-center">예약된 도서가 없습니다.</td>
    </tr>
    </tbody>
</table>

<div class="mt-4">
    <a th:href="@{/}" class="btn btn-primary">도서 목록으로</a>
    <a th:href="@{/logout}" class="btn btn-outline-danger">로그아웃</a>
</div>

</body>
</html>
