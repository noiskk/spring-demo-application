<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>도서 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="card mb-4">
    <div class="card-body">
        <div th:if="${session.loginUser == null}">
            <a th:href="@{/login}" class="btn btn-primary">로그인</a>
        </div>
        <div th:if="${session.loginUser != null}" class="d-flex align-items-center gap-2">
            <span>환영합니다, <strong th:text="${session.loginUser}"></strong>님!</span>
            <a th:href="@{/loans}" class="btn btn-sm btn-outline-primary">내정보보기</a>
            <a th:href="@{/logout}" class="btn btn-sm btn-outline-danger">로그아웃</a>
        </div>
    </div>
</div>

<h2>도서 목록</h2>
<table class="table table-hover mt-3">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>제목</th>
        <th>저자</th>
        <th>상태</th>
        <th>상세보기</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}">1</td>
        <td th:text="${book.title}">제목</td>
        <td th:text="${book.author}">저자</td>
        <td>
            <span th:if="${book.reserved}" class="badge bg-danger">예약됨</span>
            <span th:unless="${book.reserved}" class="badge bg-success">예약 가능</span>
        </td>
        <td>
            <a th:href="@{/book/{id}(id=${book.id})}" class="btn btn-sm btn-info text-white">상세정보</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
