<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>도서 상세 정보</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="card">
    <div class="card-header bg-info text-white">
        <h3>도서 상세 정보</h3>
    </div>
    <div class="card-body">
        <p><strong>도서 번호:</strong> <span th:text="${book.id}">1</span></p>
        <p><strong>도서 제목:</strong> <span th:text="${book.title}">제목</span></p>
        <p><strong>저자:</strong> <span th:text="${book.author}">저자</span></p>
        <p><strong>예약 상태:</strong>
            <span th:if="${book.reserved}" class="text-danger">예약 중</span>
            <span th:unless="${book.reserved}" class="text-success">예약 가능</span>
        </p>

        <hr>

        <div th:if="${session.loginUser != null}">
            <form th:if="${!book.reserved}" th:action="@{/books/{id}/reserve(id=${book.id})}" method="post">
                <button type="submit" class="btn btn-primary">예약하기</button>
            </form>
`
            <button th:if="${book.reserved}"
                    class="btn btn-secondary" disabled>이미 예약됨</button>
        </div>

        <div th:if="${session.loginUser == null}" class="alert alert-warning">
            예약 기능을 이용하려면 로그인이 필요합니다.
        </div>

        <a th:href="@{/books}" class="btn btn-outline-secondary mt-3">목록으로 돌아가기</a>
    </div>
</div>

</body>
</html>
